name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: 저장소 체크아웃
        uses: actions/checkout@v4

      - name: Node.js 설정
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 패키지 설치
        run: npm ci

      - name: Git 사용자 설정
        run: |
          git config --global user.email "github-actions@github.com"
          git config --global user.name "github-actions"

      - name: 빌드 & GitHub Pages 배포
        run: |
          git remote set-url origin https://x-access-token:${GITHUB_TOKEN}@github.com/yong275/rest02.git
          npm run deploy
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
